services:

  # ── Vision Models (YOLOv8 TensorRT via Triton) ──────────────────────────────
  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: triton_vision
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics (Prometheus)
    volumes:
      - ./model_repository:/models
    command: >
      tritonserver
      --model-repository=/models
      --grpc-port=8001
      --allow-http=false
      --allow-grpc=true
      --allow-metrics=true
      --metrics-port=8002
      --log-verbose=1

